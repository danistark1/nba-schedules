<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Official Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 25, 0.9);
            --nba-blue: #005bb7;
            --nba-red: #ef426f;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://images.unsplash.com/photo-1504450758481-7338eba7524a?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { padding: 50px 20px; text-align: center; }
        h1 { font-weight: 900; font-size: 2.5rem; text-transform: uppercase; margin: 0; }

        #schedule-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1100px;
            padding-bottom: 50px;
        }

        .game-card {
            background: var(--card-bg);
            border-left: 5px solid var(--nba-blue);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .team { text-align: center; flex: 1; }
        .team img { width: 70px; height: 70px; object-fit: contain; }
        .team-name { font-weight: 700; margin-top: 5px; font-size: 0.9rem; }
        .vs { font-weight: 900; color: var(--nba-red); }

        .game-info {
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <h1>NBA Official Schedule</h1>
    <p>Season 2025-26</p>
</header>

<div id="schedule-container">
    <p>Loading League Data...</p>
</div>

<script>
    // Using a reliable public NBA dev key
    const API_URL = "proxy.php";
    const response = await fetch(API_URL);

   async function fetchNBA() {
    try {
        // IMPORTANT: Point this to the local proxy file you created
        const response = await fetch('proxy.php'); 
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        const container = document.getElementById('schedule-container');
        container.innerHTML = '';

        result.data.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';

            // Using ESPN's reliable PNGs
            const homeAbbr = game.home_team.abbreviation.toLowerCase();
            const visitorAbbr = game.visitor_team.abbreviation.toLowerCase();

            card.innerHTML = `
                <div class="teams">
                    <div class="team">
                        <img src="https://a.espncdn.com/i/teamlogos/nba/500/${homeAbbr}.png">
                        <div class="team-name">${game.home_team.full_name}</div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="team">
                        <img src="https://a.espncdn.com/i/teamlogos/nba/500/${visitorAbbr}.png">
                        <div class="team-name">${game.visitor_team.full_name}</div>
                    </div>
                </div>
                <div class="game-info">
                    <strong>${new Date(game.date).toDateString()}</strong> | ${game.status}
                </div>
            `;
            container.appendChild(card);
        });
    } catch (e) {
        console.error(e);
        document.getElementById('schedule-container').innerHTML = 
            `<p>Error: ${e.message}. Check if proxy.php exists in /var/www/html/nba-schedule/</p>`;
    }
}
    fetchNBA();
</script>
</body>
</html>
